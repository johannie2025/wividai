<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wividai PRO | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        body { background: radial-gradient(circle at top left, #1a1a2e, #16213e); min-height: 100vh; color: white; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">Wividai PRO</h1>
                <p class="text-gray-400">Générateur Vidéo Programmatique</p>
            </div>
            <div id="connectionBadge" class="px-3 py-1 rounded-full text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/50">
                <i class="fas fa-circle text-[8px] mr-2"></i> SERVEUR ACTIF
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Left Side: Editor -->
            <div class="space-y-4">
                <div class="glass p-6 rounded-2xl">
                    <label class="block text-sm font-medium mb-3 text-gray-300">Configuration JSON (Scénario)</label>
                    <textarea id="jsonInput" class="w-full h-80 bg-black/40 border border-white/10 rounded-xl p-4 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-yellow-500 transition-all text-yellow-100">
{
  "title": "Aventure Saharienne",
  "background_prompt": "epic desert dunes sunset 4k cinematic",
  "currentSpeaker": 0,
  "duration": 8,
  "scenes": [
    {
      "emoji": "👳‍♂️",
      "lip_sync_text": "Le désert cache bien des secrets sous son sable brûlant.",
      "duration_sec": 4
    },
    {
      "emoji": "🐫",
      "lip_sync_text": "Et moi, je cache surtout ma soif !",
      "duration_sec": 4
    }
  ]
}
                    </textarea>
                    <button id="btnGenerate" class="w-full mt-6 bg-gradient-to-r from-yellow-500 to-orange-600 hover:from-yellow-400 hover:to-orange-500 text-white font-bold py-4 rounded-xl shadow-lg transform hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-magic"></i> GÉNÉRER LA VIDÉO
                    </button>
                </div>
            </div>

            <!-- Right Side: Preview & Status -->
            <div class="space-y-6">
                <!-- Status Card -->
                <div id="statusCard" class="glass p-6 rounded-2xl hidden">
                    <h3 class="font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-spinner fa-spin text-yellow-500"></i> Statut du Rendu
                    </h3>
                    <div class="space-y-3">
                        <div class="flex justify-between text-sm">
                            <span class="text-gray-400">ID du Job:</span>
                            <span id="jobIdDisplay" class="font-mono text-yellow-300">---</span>
                        </div>
                        <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden">
                            <div id="progressBar" class="bg-yellow-500 h-full w-0 transition-all duration-500"></div>
                        </div>
                        <p id="statusText" class="text-center text-sm text-yellow-500 animate-pulse">En file d'attente...</p>
                    </div>
                </div>

                <!-- Video Result -->
                <div id="resultCard" class="glass p-6 rounded-2xl hidden">
                    <h3 class="font-bold mb-4 text-green-400 flex items-center gap-2">
                        <i class="fas fa-check-circle"></i> Rendu Terminé !
                    </h3>
                    <video id="videoPlayer" controls class="w-full rounded-lg shadow-2xl border border-white/5"></video>
                    <a id="downloadLink" href="#" download class="block text-center mt-4 text-sm text-gray-400 hover:text-white underline">
                        Télécharger le fichier .mp4
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btnGenerate = document.getElementById('btnGenerate');
        const jsonInput = document.getElementById('jsonInput');
        const statusCard = document.getElementById('statusCard');
        const resultCard = document.getElementById('resultCard');
        const statusText = document.getElementById('statusText');
        const jobIdDisplay = document.getElementById('jobIdDisplay');
        const progressBar = document.getElementById('progressBar');
        const videoPlayer = document.getElementById('videoPlayer');
        const downloadLink = document.getElementById('downloadLink');

        let pollingInterval;

        btnGenerate.onclick = async () => {
            try {
                const jsonContent = JSON.parse(jsonInput.value);
                
                // UI Reset
                btnGenerate.disabled = true;
                btnGenerate.classList.add('opacity-50', 'cursor-not-allowed');
                statusCard.classList.remove('hidden');
                resultCard.classList.add('hidden');
                progressBar.style.width = '20%';
                statusText.innerText = "Soumission au serveur...";

                // API Call
                const response = await fetch('/generate-from-json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ json: jsonContent })
                });

                const data = await response.json();
                
                if (data.jobId) {
                    jobIdDisplay.innerText = data.jobId;
                    startPolling(data.jobId);
                }
            } catch (e) {
                alert("Erreur dans le JSON : " + e.message);
                btnGenerate.disabled = false;
                btnGenerate.classList.remove('opacity-50');
            }
        };

        function startPolling(jobId) {
            statusText.innerText = "Rendu en cours (Puppeteer + FFmpeg)...";
            progressBar.style.width = '50%';

            pollingInterval = setInterval(async () => {
                const res = await fetch(`/status/${jobId}`);
                const data = await res.json();

                if (data.status === "completed") {
                    clearInterval(pollingInterval);
                    showResult(data.videoUrl);
                }
            }, 3000);
        }

        function showResult(url) {
            statusCard.classList.add('hidden');
            resultCard.classList.remove('hidden');
            btnGenerate.disabled = false;
            btnGenerate.classList.remove('opacity-50');
            
            videoPlayer.src = url;
            downloadLink.href = url;
            videoPlayer.play();
        }
    </script>
</body>
</html>
