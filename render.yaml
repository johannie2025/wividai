services:
  - type: web
    name: wividai-engine
    env: node
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node wividai-server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    disk:
      name: wividai-outputs
      mountPath: /app/outputs
      sizeGB: 1
